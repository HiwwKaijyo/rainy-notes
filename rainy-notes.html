<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy Notes 🌧</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--surface3:#21262d;--border:#30363d;--text:#e6edf3;--text-muted:#7d8590;--text-dim:#484f58;--accent:#58a6ff;--accent2:#bc8cff;--green:#3fb950;--red:#f85149;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.rain-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.raindrop{position:absolute;top:-20px;width:1px;background:linear-gradient(to bottom,transparent,rgba(88,166,255,0.25));animation:fall linear infinite;}
@keyframes fall{to{transform:translateY(110vh);}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Loading */
.loading{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-logo{font-family:'Playfair Display',serif;font-size:32px;color:var(--accent);}
.loading-dots{display:flex;gap:6px;}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}

/* Login */
.login-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(13,17,23,0.97);backdrop-filter:blur(8px);}
.login-screen.hidden{display:none;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;text-align:center;max-width:360px;width:100%;animation:slideUp .3s;}
.login-logo{font-family:'Playfair Display',serif;font-size:28px;color:var(--accent);margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:32px;line-height:1.7;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;border-radius:10px;background:#fff;border:none;cursor:pointer;font-size:15px;font-family:inherit;font-weight:500;color:#1f1f1f;transition:.2s;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}
.login-footer{font-size:11px;color:var(--text-dim);margin-top:20px;line-height:1.6;}

/* User bar */
.user-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);}
.user-name{font-size:13px;color:var(--text-muted);flex:1;}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:.15s;}
.logout-btn:hover{color:var(--red);border-color:var(--red);}

/* App layout */
.app{display:flex;height:100vh;position:relative;z-index:1;flex-direction:column;}
.app-body{display:flex;flex:1;min-height:0;}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .3s;overflow:hidden;}
.sidebar.collapsed{width:0;min-width:0;}
.sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);display:flex;align-items:center;gap:8px;}
.sidebar-section{padding:12px 8px 4px;}
.section-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:0 8px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .15s;user-select:none;}
.nav-item:hover{background:var(--surface3);color:var(--text);}
.nav-item.active{background:rgba(88,166,255,.12);color:var(--accent);}
.nav-item .icon{font-size:14px;width:16px;text-align:center;}
.nav-item .count{margin-left:auto;font-size:11px;background:var(--surface3);padding:1px 6px;border-radius:10px;color:var(--text-dim);}
.folder-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .15s;user-select:none;}
.folder-item:hover{background:var(--surface3);color:var(--text);}
.folder-item.active{color:var(--accent2);background:rgba(188,140,255,.1);}
.folder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.folder-name{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.folder-actions{display:none;gap:4px;}
.folder-item:hover .folder-actions{display:flex;}
.folder-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 4px;border-radius:3px;font-size:11px;transition:.1s;}
.folder-actions button:hover{color:var(--red);}
.tag-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;transition:.15s;margin:2px;border:1px solid transparent;}
.tag-chip:hover{opacity:.85;}
.tag-chip.active{border-color:currentColor;}
.tag-chip .tag-x{display:none;font-size:10px;margin-left:2px;}
.tag-chip:hover .tag-x{display:inline;}
.sidebar-tags{padding:4px 8px 8px;display:flex;flex-wrap:wrap;}
.add-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text-dim);transition:.15s;border:none;background:none;width:100%;text-align:left;}
.add-btn:hover{color:var(--accent);background:rgba(88,166,255,.08);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.toolbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0;}
.toggle-sidebar{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:.15s;}
.toggle-sidebar:hover{color:var(--text);background:var(--surface3);}
.search-box{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:.2s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--text-dim);}
.view-btns{display:flex;gap:4px;}
.view-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:6px 8px;border-radius:5px;font-size:14px;transition:.15s;}
.view-btn.active,.view-btn:hover{color:var(--accent);background:rgba(88,166,255,.1);}
.new-note-btn{background:var(--accent);border:none;color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:.15s;white-space:nowrap;}
.new-note-btn:hover{background:#79bfff;}
.notes-area{flex:1;overflow-y:auto;padding:20px;display:grid;gap:16px;}
.notes-area.grid-view{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
.notes-area.list-view{grid-template-columns:1fr;max-width:800px;margin:0 auto;width:100%;}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.note-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:.2s;}
.note-card:hover{border-color:rgba(88,166,255,.4);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.note-card:hover::before{opacity:1;}
.note-title{font-size:15px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-preview{font-size:12px;color:var(--text-muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.note-meta{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;}
.note-date{font-size:11px;color:var(--text-dim);}
.note-tags{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.note-tag-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;}
.note-actions{position:absolute;top:10px;right:10px;display:none;gap:4px;}
.note-card:hover .note-actions{display:flex;}
.note-action-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;padding:4px 7px;border-radius:5px;font-size:12px;transition:.1s;}
.note-action-btn:hover{color:var(--accent);border-color:var(--accent);}
.note-action-btn.delete:hover{color:var(--red);border-color:var(--red);background:rgba(248,81,73,.1);}
.todo-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--green);background:rgba(63,185,80,.1);padding:2px 8px;border-radius:8px;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-dim);}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4;}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s;}
.overlay.hidden{display:none;}
.editor-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .2s;}
.editor-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.editor-title-input{flex:1;background:none;border:none;color:var(--text);font-size:20px;font-weight:600;font-family:inherit;outline:none;}
.editor-title-input::placeholder{color:var(--text-dim);}
.editor-body{flex:1;overflow-y:auto;padding:16px 20px;}
.editor-content{width:100%;min-height:180px;background:none;border:none;color:var(--text);font-size:14px;font-family:inherit;line-height:1.8;resize:none;outline:none;}
.editor-content::placeholder{color:var(--text-dim);}
.todo-section{margin-top:16px;border-top:1px solid var(--border);padding-top:16px;}
.todo-section-title{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
.todo-list{display:flex;flex-direction:column;gap:6px;}
.todo-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.todo-item.done{opacity:.5;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--text-dim);}
.todo-checkbox{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;background:none;}
.todo-checkbox.checked{background:var(--green);border-color:var(--green);color:#fff;font-size:10px;}
.todo-text{flex:1;font-size:13px;background:none;border:none;color:inherit;font-family:inherit;outline:none;}
.todo-delete{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px;opacity:0;transition:.1s;}
.todo-item:hover .todo-delete{opacity:1;}
.todo-delete:hover{color:var(--red);}
.add-todo-row{display:flex;gap:8px;margin-top:8px;}
.add-todo-input{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.add-todo-input:focus{border-color:var(--green);}
.add-todo-btn{background:rgba(63,185,80,.15);border:1px solid rgba(63,185,80,.3);color:var(--green);cursor:pointer;padding:7px 12px;border-radius:7px;font-size:13px;}
.add-todo-btn:hover{background:rgba(63,185,80,.25);}
.editor-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.editor-footer-actions{display:flex;gap:8px;margin-left:auto;}
.select-box{background:var(--surface3);border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:6px 10px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
.btn-save{background:var(--accent);border:none;color:#fff;padding:7px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:.15s;}
.btn-save:hover{background:#79bfff;}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--text-muted);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:.15s;}
.btn-cancel:hover{color:var(--text);border-color:var(--text-muted);}
.small-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:360px;animation:slideUp .2s;}
.small-modal h3{font-size:16px;margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:.2s;}
.form-input:focus{border-color:var(--accent);}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;}
.color-dot.selected{border-color:#fff;transform:scale(1.15);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;animation:toastIn .3s;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-logo">🌧 Rainy Notes</div>
  <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
</div>

<div class="rain-bg" id="rainBg"></div>

<!-- Login -->
<div class="login-screen hidden" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🌧 Rainy Notes</div>
    <div class="login-sub">โน้ตของคุณ พร้อมใช้ทุกที่<br>บันทึกบน Cloud ปลอดภัยแยกตามบัญชี</div>
    <button class="google-btn" onclick="signInGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      เข้าสู่ระบบด้วย Google
    </button>
    <div class="login-footer">แต่ละบัญชีเห็นเฉพาะข้อมูลของตัวเอง</div>
  </div>
</div>

<!-- App -->
<div class="app" id="appRoot" style="display:none">
  <div class="user-bar">
    <img class="user-avatar" id="userAvatar" src="" alt="">
    <span class="user-name" id="userName"></span>
    <button class="logout-btn" onclick="doSignOut()">ออกจากระบบ</button>
  </div>
  <div class="app-body">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="logo">🌧 Rainy Notes</div></div>
      <div class="sidebar-section">
        <div class="nav-item active" onclick="filterView('all')" id="nav-all"><span class="icon">📋</span> โน้ตทั้งหมด <span class="count" id="count-all">0</span></div>
        <div class="nav-item" onclick="filterView('todo')" id="nav-todo"><span class="icon">✅</span> To-do Lists <span class="count" id="count-todo">0</span></div>
      </div>
      <div class="sidebar-section">
        <div class="section-label">โฟลเดอร์</div>
        <div id="folderList"></div>
        <button class="add-btn" onclick="showFolderModal()">＋ เพิ่มโฟลเดอร์</button>
      </div>
      <div class="sidebar-section" style="flex:1">
        <div class="section-label">แท็ก</div>
        <div class="sidebar-tags" id="tagList"></div>
        <button class="add-btn" onclick="showTagModal()">＋ เพิ่มแท็ก</button>
      </div>
    </aside>
    <main class="main">
      <div class="toolbar">
        <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
        <input class="search-box" id="searchBox" placeholder="🔍 ค้นหาโน้ต..." oninput="renderNotes()">
        <div class="view-btns">
          <button class="view-btn active" onclick="setView('grid',this)">⊞</button>
          <button class="view-btn" onclick="setView('list',this)">≡</button>
        </div>
        <button class="new-note-btn" onclick="openEditor(null)">＋ โน้ตใหม่</button>
      </div>
      <div class="notes-area grid-view" id="notesArea"></div>
    </main>
  </div>
</div>

<!-- Editor -->
<div class="overlay hidden" id="editorOverlay" onclick="handleOvClick(event)">
  <div class="editor-modal" onclick="event.stopPropagation()">
    <div class="editor-header">
      <input class="editor-title-input" id="editorTitle" placeholder="ชื่อโน้ต...">
      <button class="btn-cancel" onclick="closeEditor()">✕</button>
    </div>
    <div class="editor-body">
      <textarea class="editor-content" id="editorContent" placeholder="เขียนโน้ตที่นี่..." rows="8"></textarea>
      <div class="todo-section">
        <div class="todo-section-title">✅ To-do List</div>
        <div class="todo-list" id="editorTodoList"></div>
        <div class="add-todo-row">
          <input class="add-todo-input" id="newTodoInput" placeholder="เพิ่ม to-do..." onkeydown="if(event.key==='Enter')addTodo()">
          <button class="add-todo-btn" onclick="addTodo()">＋ เพิ่ม</button>
        </div>
      </div>
    </div>
    <div style="padding:10px 20px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border)" id="editorTagsRow"></div>
    <div class="editor-footer">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <select class="select-box" id="editorFolder"><option value="">📁 ไม่มีโฟลเดอร์</option></select>
        <div id="tagSelector" style="display:flex;flex-wrap:wrap;gap:4px"></div>
      </div>
      <div class="editor-footer-actions">
        <button class="btn-cancel" onclick="closeEditor()">ยกเลิก</button>
        <button class="btn-save" onclick="saveNote()">💾 บันทึก</button>
      </div>
    </div>
  </div>
</div>

<!-- Folder Modal -->
<div class="overlay hidden" id="folderOverlay" onclick="this.classList.add('hidden')">
  <div class="small-modal" onclick="event.stopPropagation()">
    <h3>📁 โฟลเดอร์ใหม่</h3>
    <div class="form-group"><label class="form-label">ชื่อโฟลเดอร์</label><input class="form-input" id="folderNameInput" placeholder="เช่น งาน, ส่วนตัว..."></div>
    <div class="form-group"><label class="form-label">สี</label><div class="color-row" id="folderColorRow"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('folderOverlay').classList.add('hidden')">ยกเลิก</button>
      <button class="btn-save" onclick="saveFolder()">บันทึก</button>
    </div>
  </div>
</div>

<!-- Tag Modal -->
<div class="overlay hidden" id="tagOverlay" onclick="this.classList.add('hidden')">
  <div class="small-modal" onclick="event.stopPropagation()">
    <h3>🏷 แท็กใหม่</h3>
    <div class="form-group"><label class="form-label">ชื่อแท็ก</label><input class="form-input" id="tagNameInput" placeholder="เช่น สำคัญ, ไอเดีย..."></div>
    <div class="form-group"><label class="form-label">สี</label><div class="color-row" id="tagColorRow"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('tagOverlay').classList.add('hidden')">ยกเลิก</button>
      <button class="btn-save" onclick="saveTag()">บันทึก</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,addDoc,updateDoc,deleteDoc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut as fbOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app=initializeApp({apiKey:"AIzaSyAXg9JXFe48tcxtFAC-2Adb6c5x01bSbvM",authDomain:"rainy-notes.firebaseapp.com",projectId:"rainy-notes",storageBucket:"rainy-notes.firebasestorage.app",messagingSenderId:"508994533300",appId:"1:508994533300:web:4c625cb86a9401e77fa4e1"});
const db=getFirestore(app),auth=getAuth(app),gp=new GoogleAuthProvider();

let uid=null,notes=[],folders=[],tags=[],editNote=null,edTodos=[],activeFolder=null,activeTag=null,filterMode='all';
let unN=null,unF=null,unT=null;
const COLORS=['#58a6ff','#bc8cff','#3fb950','#f78166','#d29922','#79c0ff','#ff7b72','#ffa657'];
let fColor=COLORS[0],tColor=COLORS[0];

// Rain
const rb=document.getElementById('rainBg');
for(let i=0;i<30;i++){const d=document.createElement('div');d.className='raindrop';d.style.cssText=`left:${Math.random()*100}%;height:${40+Math.random()*60}px;animation-duration:${0.6+Math.random()*0.8}s;animation-delay:-${Math.random()*2}s;opacity:${0.2+Math.random()*0.3}`;rb.appendChild(d);}

// Color pickers
function mkPicker(id,cb){
  const el=document.getElementById(id);el.innerHTML='';
  COLORS.forEach((c,i)=>{const d=document.createElement('div');d.className='color-dot'+(i===0?' selected':'');d.style.background=c;d.onclick=()=>{el.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');cb(c);};el.appendChild(d);});
}
mkPicker('folderColorRow',c=>fColor=c);
mkPicker('tagColorRow',c=>tColor=c);

// Auth
window.signInGoogle=async()=>{try{await signInWithPopup(auth,gp);}catch(e){toast('❌ '+e.message);}};
window.doSignOut=async()=>{if(!confirm('ออกจากระบบ?'))return;[unN,unF,unT].forEach(u=>u&&u());notes=folders=tags=[];await fbOut(auth);};

onAuthStateChanged(auth,user=>{
  document.getElementById('loading').style.display='none';
  if(user){
    uid=user.uid;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appRoot').style.display='flex';
    document.getElementById('userAvatar').src=user.photoURL||'';
    document.getElementById('userName').textContent=user.displayName||user.email;
    startListeners();
  } else {
    uid=null;
    document.getElementById('appRoot').style.display='none';
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});

function uCol(n){return collection(db,'users',uid,n);}
function uDoc(n,id){return doc(db,'users',uid,n,id);}

function startListeners(){
  if(unF)unF();
  unF=onSnapshot(query(uCol('folders'),orderBy('createdAt')),s=>{folders=s.docs.map(d=>({id:d.id,...d.data()}));renderSidebar();renderFolderSel();});
  if(unT)unT();
  unT=onSnapshot(query(uCol('tags'),orderBy('createdAt')),s=>{tags=s.docs.map(d=>({id:d.id,...d.data()}));renderSidebar();renderTagSel();});
  if(unN)unN();
  unN=onSnapshot(query(uCol('notes'),orderBy('updatedAt','desc')),s=>{notes=s.docs.map(d=>({id:d.id,...d.data()}));updateCounts();renderNotes();});
}

// Sidebar
function renderSidebar(){
  const fl=document.getElementById('folderList');fl.innerHTML='';
  folders.forEach(f=>{
    const d=document.createElement('div');d.className='folder-item'+(activeFolder===f.id?' active':'');
    d.innerHTML=`<div class="folder-dot" style="background:${f.color}"></div><span class="folder-name">${f.name}</span><span class="count">${notes.filter(n=>n.folderId===f.id).length}</span><div class="folder-actions"><button onclick="event.stopPropagation();delFolder('${f.id}')">🗑</button></div>`;
    d.onclick=()=>{activeFolder=activeFolder===f.id?null:f.id;activeTag=null;filterMode='all';navInactive();renderSidebar();renderNotes();};
    fl.appendChild(d);
  });
  const tl=document.getElementById('tagList');tl.innerHTML='';
  tags.forEach(t=>{
    const c=document.createElement('div');c.className='tag-chip'+(activeTag===t.id?' active':'');
    c.style.cssText=`background:${t.color}22;color:${t.color}`;
    c.innerHTML=`# ${t.name} <span class="tag-x" onclick="event.stopPropagation();delTag('${t.id}')">✕</span>`;
    c.onclick=()=>{activeTag=activeTag===t.id?null:t.id;activeFolder=null;filterMode='all';navInactive();renderSidebar();renderNotes();};
    tl.appendChild(c);
  });
}
function navInactive(){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));}
window.filterView=m=>{filterMode=m;activeFolder=activeTag=null;navInactive();document.getElementById('nav-'+m)?.classList.add('active');renderSidebar();renderNotes();};
function updateCounts(){document.getElementById('count-all').textContent=notes.length;document.getElementById('count-todo').textContent=notes.filter(n=>n.todos?.length>0).length;}
function renderFolderSel(){const s=document.getElementById('editorFolder'),p=s.value;s.innerHTML='<option value="">📁 ไม่มีโฟลเดอร์</option>';folders.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent='📁 '+f.name;s.appendChild(o);});s.value=p;}
function renderTagSel(){
  const c=document.getElementById('tagSelector');c.innerHTML='';
  tags.forEach(t=>{
    const ch=document.createElement('div');ch.className='tag-chip';ch.style.cssText=`background:${t.color}22;color:${t.color}`;ch.textContent='# '+t.name;ch.dataset.tagId=t.id;
    ch.onclick=()=>{ch.classList.toggle('active');ch.style.borderColor=ch.classList.contains('active')?t.color:'transparent';renderEditorTagsRow();};
    c.appendChild(ch);
  });
  if(editNote?.tagIds)editNote.tagIds.forEach(id=>{const el=c.querySelector(`[data-tag-id="${id}"]`);if(el){el.classList.add('active');const tg=tags.find(x=>x.id===id);if(tg)el.style.borderColor=tg.color;}});
  renderEditorTagsRow();
}
function renderEditorTagsRow(){
  const row=document.getElementById('editorTagsRow');row.innerHTML='';
  getSelTags().forEach(id=>{const t=tags.find(x=>x.id===id);if(!t)return;const c=document.createElement('div');c.className='tag-chip active';c.style.cssText=`background:${t.color}22;color:${t.color};border-color:${t.color}`;c.textContent='# '+t.name;row.appendChild(c);});
}
function getSelTags(){return[...document.getElementById('tagSelector').querySelectorAll('.tag-chip.active')].map(e=>e.dataset.tagId).filter(Boolean);}

// Notes
window.renderNotes=function(){
  const area=document.getElementById('notesArea'),q=document.getElementById('searchBox').value.toLowerCase();
  let ns=[...notes];
  if(filterMode==='todo')ns=ns.filter(n=>n.todos?.length>0);
  if(activeFolder)ns=ns.filter(n=>n.folderId===activeFolder);
  if(activeTag)ns=ns.filter(n=>n.tagIds?.includes(activeTag));
  if(q)ns=ns.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q));
  if(!ns.length){area.innerHTML='<div class="empty"><div class="empty-icon">🌧</div><div style="font-size:16px;color:var(--text-muted)">ไม่มีโน้ต</div><p>กด "+ โน้ตใหม่" เพื่อเริ่มต้น</p></div>';return;}
  area.innerHTML='';
  ns.forEach(n=>{
    const card=document.createElement('div');card.className='note-card';
    const dt=n.updatedAt?.toDate?fmtDate(n.updatedAt.toDate()):'';
    const fld=folders.find(f=>f.id===n.folderId);
    const td=n.todos||[];const done=td.filter(t=>t.done).length;
    let tagh='';if(n.tagIds)n.tagIds.forEach(id=>{const t=tags.find(x=>x.id===id);if(t)tagh+=`<span class="note-tag-badge" style="background:${t.color}22;color:${t.color}">#${t.name}</span>`;});
    card.innerHTML=`<div class="note-actions"><button class="note-action-btn" onclick="event.stopPropagation();openEditor('${n.id}')">✏️</button><button class="note-action-btn delete" onclick="event.stopPropagation();delNote('${n.id}')">🗑</button></div><div class="note-title">${n.title||'ไม่มีชื่อ'}</div><div class="note-preview">${n.content?esc(n.content):td.map(t=>t.text).join(', ')||'<span style="color:var(--text-dim)">ว่างเปล่า</span>'}</div><div class="note-meta"><div class="note-tags">${tagh}${td.length?`<span class="todo-badge">✅ ${done}/${td.length}</span>`:''}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">${fld?`<span style="font-size:10px;color:${fld.color}">📁 ${fld.name}</span>`:''}<span class="note-date">${dt}</span></div></div>`;
    card.onclick=()=>openEditor(n.id);area.appendChild(card);
  });
};
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){const now=new Date(),df=now-d;if(df<60000)return'เมื่อกี้';if(df<3600000)return Math.floor(df/60000)+' นาทีที่แล้ว';if(df<86400000)return Math.floor(df/3600000)+' ชั่วโมงที่แล้ว';return d.toLocaleDateString('th-TH');}

// Editor
window.openEditor=function(id){
  editNote=id?notes.find(n=>n.id===id):null;
  document.getElementById('editorTitle').value=editNote?.title||'';
  document.getElementById('editorContent').value=editNote?.content||'';
  document.getElementById('editorFolder').value=editNote?.folderId||'';
  edTodos=editNote?.todos?JSON.parse(JSON.stringify(editNote.todos)):[];
  renderEdTodos();renderTagSel();
  document.getElementById('editorOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('editorTitle').focus(),100);
};
window.closeEditor=()=>{document.getElementById('editorOverlay').classList.add('hidden');editNote=null;};
window.handleOvClick=e=>{if(e.target.id==='editorOverlay')closeEditor();};
function renderEdTodos(){
  const list=document.getElementById('editorTodoList');list.innerHTML='';
  edTodos.forEach((t,i)=>{const item=document.createElement('div');item.className='todo-item'+(t.done?' done':'');item.innerHTML=`<div class="todo-checkbox ${t.done?'checked':''}" onclick="togTodo(${i})">${t.done?'✓':''}</div><input class="todo-text" value="${esc(t.text)}" onchange="edTodos[${i}].text=this.value" placeholder="รายการ..."><button class="todo-delete" onclick="rmTodo(${i})">✕</button>`;list.appendChild(item);});
}
window.togTodo=i=>{edTodos[i].done=!edTodos[i].done;renderEdTodos();};
window.rmTodo=i=>{edTodos.splice(i,1);renderEdTodos();};
window.addTodo=()=>{const inp=document.getElementById('newTodoInput'),t=inp.value.trim();if(!t)return;edTodos.push({text:t,done:false});inp.value='';renderEdTodos();inp.focus();};
window.saveNote=async function(){
  const title=document.getElementById('editorTitle').value.trim(),content=document.getElementById('editorContent').value.trim(),folderId=document.getElementById('editorFolder').value,tagIds=getSelTags(),todos=edTodos;
  if(!title&&!content&&!todos.length){toast('⚠️ กรุณาเพิ่มเนื้อหา');return;}
  const data={title:title||'ไม่มีชื่อ',content,folderId:folderId||null,tagIds,todos,updatedAt:serverTimestamp()};
  try{if(editNote){await updateDoc(uDoc('notes',editNote.id),data);toast('✅ บันทึกแล้ว');}else{data.createdAt=serverTimestamp();await addDoc(uCol('notes'),data);toast('✅ สร้างโน้ตแล้ว');}closeEditor();}catch(e){toast('❌ '+e.message);}
};
window.delNote=async id=>{if(!confirm('ลบโน้ตนี้?'))return;await deleteDoc(uDoc('notes',id));toast('🗑 ลบแล้ว');};

// Folders
window.showFolderModal=()=>{document.getElementById('folderNameInput').value='';fColor=COLORS[0];document.querySelectorAll('#folderColorRow .color-dot').forEach((d,i)=>d.classList.toggle('selected',i===0));document.getElementById('folderOverlay').classList.remove('hidden');setTimeout(()=>document.getElementById('folderNameInput').focus(),100);};
window.saveFolder=async()=>{const n=document.getElementById('folderNameInput').value.trim();if(!n){toast('⚠️ กรุณาใส่ชื่อ');return;}await addDoc(uCol('folders'),{name:n,color:fColor,createdAt:serverTimestamp()});document.getElementById('folderOverlay').classList.add('hidden');toast('📁 สร้างโฟลเดอร์แล้ว');};
window.delFolder=async id=>{if(!confirm('ลบโฟลเดอร์นี้?'))return;await deleteDoc(uDoc('folders',id));if(activeFolder===id){activeFolder=null;renderNotes();}toast('🗑 ลบแล้ว');};

// Tags
window.showTagModal=()=>{document.getElementById('tagNameInput').value='';tColor=COLORS[0];document.querySelectorAll('#tagColorRow .color-dot').forEach((d,i)=>d.classList.toggle('selected',i===0));document.getElementById('tagOverlay').classList.remove('hidden');setTimeout(()=>document.getElementById('tagNameInput').focus(),100);};
window.saveTag=async()=>{const n=document.getElementById('tagNameInput').value.trim();if(!n){toast('⚠️ กรุณาใส่ชื่อ');return;}await addDoc(uCol('tags'),{name:n,color:tColor,createdAt:serverTimestamp()});document.getElementById('tagOverlay').classList.add('hidden');toast('🏷 สร้างแท็กแล้ว');};
window.delTag=async id=>{if(!confirm('ลบแท็กนี้?'))return;await deleteDoc(uDoc('tags',id));if(activeTag===id){activeTag=null;renderNotes();}toast('🗑 ลบแล้ว');};

// UI
window.toggleSidebar=()=>document.getElementById('sidebar').classList.toggle('collapsed');
window.setView=(m,btn)=>{document.getElementById('notesArea').className='notes-area '+(m==='grid'?'grid-view':'list-view');document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
</script>
</body>
</html>
